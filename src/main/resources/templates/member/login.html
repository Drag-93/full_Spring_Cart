<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>login</title>
    <link rel="stylesheet" th:href="@{/css/member/login.css}">
</head>
<body>
<div th:replace="~{fragments/common/header :: headerFragment}"></div>
<div class="login">
    <div class="login-con">
        <h1>로그인</h1>
        <form th:action="@{/member/login}" method="post">
            <ul>
                <li>
                    <input type="text" name="userEmail" id="userEmail" placeholder="이메일">
                </li>
                <li>
                    <input type="password" name="userPw" id="userPw" placeholder="비밀번호">
                </li>

                <th:block th:if="error">
                    <li th:text="${exception}"></li>
                </th:block>
                <th:block th:if="${errorMessage}">
                    <li th:text="${errorMessage}"></li>
                </th:block>
                <li>
                    <input type="submit" value="로그인">
                </li>
            </ul>


        </form>
    </div>
</div>
</body>
</html>
